<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pesquisa Culturama</title>
    <link rel="icon" href="./img/culturama-favico.png">
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap"
      rel="stylesheet">
  </head>
  <body>
    <head>
      <h1>Online Research</h1>
      <section>
        <form action="sucess.html" method="get">
          <fieldset>
            <legend>Personal Information</legend>
            <label for="name">Name</label>
            <input type="text" id="name" name="userName" required />
            <br />
            <label for="age">Age</label>
            <input
              type="number"
              id="age"
              name="userAge"
              min="12"
              max="100"
              required />
            <br />

            <label for="birthDate">Birth Date</label>
            <input type="date" id="birthDate" name="userBirthDate" required />
            <br />

            <label for="email">Email</label>
            <input type="email" id="email" name="userEmail" required />
            <br />

            <label for="phone">Phone</label>
            <input
              type="tel"
              id="phone"
              name="userPhoneNumber"
              pattern="[0-9]{11}"
              placeholder="000 + number without space" />
            <br />

            <label for="image">Upload Photo</label>
            <input type="file" id="image" accept="image/*" name="userImage" />
            <br />
          </fieldset>

          <fieldset>
            <legend>Profile</legend>

            <p>Gender:</p>
            <input type="radio" id="female" name="userGender" value="female" />
            <label for="female">Female</label>

            <input type="radio" id="male" name="userGender" value="male" />
            <label for="male">Male</label>

            <input
              type="radio"
              id="notInformed"
              name="userGender"
              value="notInformed" />
            <label for="notInformed">Not Informed</label>
            <br />

            <label for="maritalStatus">Marital Status:</label>
            <select id="maritalStatus" name="maritalStatus">
              <option value="notInformed">Select...</option>
              <option value="married">Married</option>
              <option value="single">Single</option>
              <option value="divorced">Divorced</option>
            </select>
            <br />

            <label for="city">City:</label>
            <select id="city" name="city">
              <option value="Porto">Porto</option>
              <option value="Lisbon">Lisbon</option>
              <option value="Aves">Aves</option>
              <option value="Sintra">Sintra</option>
              <option value="Vila Nova de Gaia">Vila Nova de Gaia</option>
              <option value="Cascais">Cascais</option>
              <option value="Loures">Loures</option>
              <option value="Seixal">Seixal</option>
              <option value="Braga">Braga</option>
              <option value="Almada">Almada</option>
              <option value="Matosinhos">Matosinhos</option>
              <option value="Amadora">Amadora</option>
              <option value="Oeiras">Oeiras</option>
              <option value="Gondomar">Gondomar</option>
              <option value="Guimarães">Guimarães</option>
              <option value="Odivelas">Odivelas</option>
              <option value="Coimbra">Coimbra</option>
              <option value="Vila Franca de Xira">Vila Franca de Xira</option>
              <option value="Maia">Maia</option>
              <option value="Famalicão">Famalicão</option>
              <option value="Leiria">Leiria</option>
              <option value="Barcelos">Barcelos</option>
              <option value="Viseu">Viseu</option>
              <option value="Viana do Castelo">Viana do Castelo</option>
              <option value="Aveiro">Aveiro</option>
              <option value="Barreiro">Barreiro</option>
              <option value="Queluz">Queluz</option>
              <option value="Ponta Delgada">Ponta Delgada</option>
              <option value="Faro">Faro</option>
              <option value="Santarém">Santarém</option>
              <option value="Castelo Branco">Castelo Branco</option>
              <option value="Ovar">Ovar</option>
              <option value="Évora">Évora</option>
              <option value="Vila Real">Vila Real</option>
              <option value="Rio Tinto">Rio Tinto</option>
              <option value="Amora">Amora</option>
              <option value="Águeda">Águeda</option>
              <option value="Vale de Cavalos">Vale de Cavalos</option>
              <option value="Corroios">Corroios</option>
              <option value="Albufeira">Albufeira</option>
              <option value="Guarda">Guarda</option>
              <option value="Abrantes">Abrantes</option>
              <option value="Mafamude">Mafamude</option>
              <option value="Ermezinde">Ermezinde</option>
              <option value="Beja">Beja</option>
              <option value="Agualva">Agualva</option>
              <option value="Bragança">Bragança</option>
              <option value="Espinho">Espinho</option>
              <option value="Charneca">Charneca</option>
              <option value="Perafita">Perafita</option>
              <option value="Funchal">Funchal</option>
              <option value="Póvoa de Santa Iria">Póvoa de Santa Iria</option>
              <option value="Senhora da Hora">Senhora da Hora</option>
              <option value="Tondela">Tondela</option>
              <option value="Arrentela">Arrentela</option>
              <option value="Massamá">Massamá</option>
              <option value="Águas Santas">Águas Santas</option>
              <option value="Estoril">Estoril</option>
              <option value="Pinhal Novo">Pinhal Novo</option>
              <option value="Portalegre">Portalegre</option>
              <option value="Cartaxo">Cartaxo</option>
              <option value="Lagoa">Lagoa</option>
              <option value="Vagos">Vagos</option>
              <option value="São João da Madeira">São João da Madeira</option>
              <option value="Oliveira de Azemeis">Oliveira de Azemeis</option>
              <option value="Entroncamento">Entroncamento</option>
              <option value="Mangualde">Mangualde</option>
              <option value="Arganil">Arganil</option>
              <option value="Ponte da Barca">Ponte da Barca</option>
              <option value="Feira">Feira</option>
              <option value="Setúbal">Setúbal</option>
              <option value="Paredes de Coura">Paredes de Coura</option>
              <option value="Belmonte">Belmonte</option>
            </select>
          </fieldset>

          <fieldset>
            <legend>Habits:</legend>

            <p>Social Media</p>
            <input
              type="checkbox"
              id="instagram"
              name="social"
              value="instagram" />
            <label for="instagram">Instagram</label>
            <br />

            <input
              type="checkbox"
              id="facebook"
              name="social"
              value="facebook" />
            <label for="facebook">Facebook</label>
            <br />

            <input type="checkbox" id="x" name="social" value="x" />
            <label for="x">X</label>
            <br />

            <input
              type="checkbox"
              id="linkedin"
              name="social"
              value="linkedin" />
            <label for="linkedin">LinkedIn</label>
            <br />

            <label for="musicStyle">Music Style:</label>
            <input
              id="musicStyle"
              type="text"
              name="musicStyle"
              list="styleTypes" />
            <datalist id="styleTypes">
              <option value="Pop"></option>
              <option value="Rock"></option>
              <option value="Jazz"></option>
              <option value="Classical"></option>
              <option value="Fado"></option>
              <option value="Hip Hop"></option>
              <option value="Electronic"></option>
              <option value="Reggae"></option>
              <option value="Blues"></option>
              <option value="Country"></option>
              <option value="Metal"></option>
              <option value="Salsa"></option>
              <option value="R&B"></option>
              <option value="Punk"></option>
              <option value="Funk"></option>
              <option value="Gospel"></option>
              <option value="Disco"></option>
              <option value="Indie"></option>
            </datalist>
            <br />

            <label for="favoriteColor">Favorite Color:</label>
            <input type="color" id="favoriteColor" name="favoriteColor" />
          </fieldset>

          <fieldset>
            <legend>Opinion</legend>
            <p>Satisfaction Level:</p>

            <input
              type="radio"
              name="satisfactionLevel"
              id="excellent"
              value="excellent" />
            <label for="excellent">Excellent</label>
            <br />
            <input
              type="radio"
              name="satisfactionLevel"
              id="good"
              value="good" />
            <label for="good">Good</label>
            <br />

            <input
              type="radio"
              name="satisfactionLevel"
              id="regular"
              value="regular" />
            <label for="regular">Regular</label>
            <br />

            <input type="radio" name="satisfactionLevel" id="bad" value="bad" />
            <label for="bad">Bad</label>
            <br />

            <label for="comments">Additional Comments:</label>
            <textarea
              id="comments"
              name="comments"
              placeholder="Write here..."></textarea>
          </fieldset>
          <fieldset>
            <legend>Confirmation</legend>

            <input type="checkbox" name="userLgpd" id="userLgpdTerm"
              value="accepted" required>
            <label for="userLgpdTerm">I agree with the terms of use and privacy
              policy.</label><br />

            <input type="checkbox" name="userGetResult" id="getResult"
              value="accepted">
            <label for="userGetResult">I would receive the research results by
              email.
              policy.</label><br />

          </fieldset>
          <button type="submit">Send</button>
          <button type="reset">Clean</button>
        </form>
      </section>
    </head>
  </body>
</html>
